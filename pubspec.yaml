name: my_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure storage
  flutter_secure_storage: ^10.0.0   # <-- فقط این خط تغییر کرد

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for Hive adapters
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true