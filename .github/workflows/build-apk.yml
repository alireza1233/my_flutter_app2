name: Build Flutter APK and Commit to my-build folder

on:
  workflow_dispatch:  # اجرای دستی از طریق GitHub Actions

# اعطای دسترسی نوشتن به مخزن برای commit کردن
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # این کار باعث می‌شود که بعد از commit، دوباره fetch نکند
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Create my-build directory
        run: mkdir -p my-build

      - name: Copy APK to my-build folder
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk my-build/
          # در صورت تمایل می‌توانید نام فایل را با تاریخ و شماره build تغییر دهید
          # مثلاً: cp build/app/outputs/flutter-apk/app-release.apk my-build/app-${{ github.run_number }}.apk

      - name: Commit and push APK to my-build folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add APK build #${{ github.run_number }} to my-build folder"
          branch: ${{ github.ref_name }}   # یا 'main' اگر می‌خواهید در شاخه اصلی commit شود
          file_pattern: 'my-build/*.apk'
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"
